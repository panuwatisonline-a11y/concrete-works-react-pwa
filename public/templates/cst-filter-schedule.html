<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{documentTitle}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    @page { size: 210mm 297mm; margin: 0; }
    * { box-sizing: border-box; }
    html { font-size: 9pt; -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      font-family: Sarabun, "Segoe UI", system-ui, sans-serif;
      color: #111827;
      background: #fff;
    }
    @media screen {
      body { background: #e2e8f0; padding: 10px; }
    }
    .a4-page {
      width: 210mm;
      min-height: 297mm;
      margin: 0 auto;
      padding: 10mm;
      background: #fff;
    }
    .sheet-header {
      margin-bottom: 8px;
      border-bottom: 2px solid #1e293b;
      padding-bottom: 6px;
    }
    .sheet-header h1 {
      margin: 0 0 4px;
      font-size: 1.35rem;
      font-weight: 700;
    }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 24px;
      font-size: 0.92rem;
    }
    .meta strong { font-weight: 600; }
    .schedule-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }
    .schedule-table th,
    .schedule-table td {
      border: 1px solid #cbd5e1;
      padding: 3px 5px;
      vertical-align: top;
      text-align: left;
    }
    .schedule-table th {
      background: #f1f5f9;
      font-weight: 600;
    }
    .schedule-table .col-date { width: 9%; }
    .schedule-table .col-work { width: 12%; }
    .schedule-table .col-structure { width: 11%; }
    .schedule-table .col-location { width: 22%; }
    .schedule-table .col-no { width: 10%; }
    .schedule-table .col-mix { width: 18%; }
    .schedule-table .col-vol { width: 7%; text-align: right; }
    .group-age-row td {
      background: #e2e8f0;
      font-weight: 700;
      font-size: 0.95rem;
    }
    .group-empty-row td {
      color: #64748b;
      font-style: italic;
    }
    .page-footer {
      margin-top: 8px;
      font-size: 0.8rem;
      color: #64748b;
      text-align: right;
    }
  </style>
</head>
<body>
  <div class="a4-page" data-print-doc="cst-filter">
    <header class="sheet-header">
      <h1>CST Filter Schedule</h1>
      <div class="meta">
        <span><strong>วันทดสอบ:</strong> {{testDateDisplay}}</span>
        <span><strong>รวม:</strong> {{totalCount}} รายการ</span>
        <span><strong>พิมพ์เมื่อ:</strong> {{printedAt}}</span>
      </div>
    </header>
    <div class="sheet-body">
      {{sectionsHtml}}
    </div>
    <footer class="page-footer">{{pageLabel}}</footer>
  </div>
</body>
</html>

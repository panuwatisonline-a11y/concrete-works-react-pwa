name: Supabase keepalive

on:
  schedule:
    # 00:00 UTC every 3 days — stays under Supabase ~7-day inactivity pause
    - cron: '0 0 */3 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping Supabase REST API
        run: |
          set -euo pipefail
          url="${SUPABASE_URL%/}/rest/v1/Status?select=id&limit=1"
          code=$(curl -sS -o /tmp/body -w "%{http_code}" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -H "Accept: application/json" \
            "$url")
          echo "HTTP $code"
          cat /tmp/body
          test "$code" -ge 200 -a "$code" -lt 300
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
